<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Sorteo Mundial 2026</title>
  <script src="data.js"></script>
  <style>
    :root {
      --bg: #07152f;
      --bg-2: #0b2145;
      --panel: rgba(13, 35, 72, 0.9);
      --panel-2: rgba(10, 29, 61, 0.96);
      --gold: #d7b46a;
      --gold-2: #f2d487;
      --text: #f7f9ff;
      --muted: #b6c4de;
      --line: rgba(215, 180, 106, 0.24);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 5%, rgba(215, 180, 106, 0.13), transparent 26rem),
        linear-gradient(145deg, #061126 0%, #071a39 46%, #061126 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .hero {
      display: grid;
      gap: 18px;
      padding: 26px 0 20px;
    }

    .eyebrow {
      color: var(--gold-2);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      max-width: 820px;
      font-size: clamp(2.25rem, 5vw, 4.75rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      margin: 16px 0 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(5, 16, 35, 0.78);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .tab {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      transition: 180ms ease;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #15213c;
      box-shadow: 0 10px 24px rgba(215, 180, 106, 0.22);
    }

    .view {
      display: none;
    }

    .view.active {
      display: grid;
      gap: 22px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 22px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--gold-2);
      font-size: 0.84rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-height: 48px;
      padding: 0 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: #091934;
      color: var(--text);
      outline: none;
    }

    .stat {
      min-width: 148px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      text-align: right;
    }

    .stat strong {
      display: block;
      color: var(--gold-2);
      font-size: 1.6rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .assignments,
    .country-detail,
    .bracket-wrap {
      display: grid;
      gap: 18px;
    }

    .country-card-full,
    .country-detail-card {
      overflow: hidden;
    }

    .country-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .flag {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      font-size: 2rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .country-head h2,
    .country-head h3 {
      font-size: 1.35rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
    }

    .pill {
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.84rem;
    }

    .matches {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .match-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
    }

    .match-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--gold-2);
      font-weight: 900;
    }

    .opponent {
      font-size: 1.05rem;
      font-weight: 850;
    }

    .rival-owner {
      padding: 10px 12px;
      border-left: 3px solid var(--gold-2);
      border-radius: 10px;
      background: rgba(215, 180, 106, 0.12);
      color: #fff4d5;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .country-tile {
      min-height: 138px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 16px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .country-tile:hover,
    .country-tile.active {
      transform: translateY(-2px);
      border-color: rgba(242, 212, 135, 0.72);
      background: rgba(215, 180, 106, 0.13);
    }

    .country-tile .flag {
      width: 54px;
      height: 54px;
    }

    .country-tile strong {
      line-height: 1.15;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 20px 20px 0;
    }

    .section-title h2 {
      font-size: 1.25rem;
    }

    .section-title span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .bracket {
      display: grid;
      grid-template-columns: repeat(5, minmax(220px, 1fr));
      gap: 16px;
      overflow-x: auto;
      padding: 20px;
    }

    .round {
      display: grid;
      align-content: start;
      gap: 12px;
      min-width: 220px;
    }

    .round h2 {
      color: var(--gold-2);
      font-size: 1rem;
      text-transform: uppercase;
    }

    .bracket-match {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
    }

    .team-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px;
      border-radius: 10px;
      color: var(--muted);
    }

    .team-row.winner {
      background: rgba(215, 180, 106, 0.16);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(215, 180, 106, 0.28);
    }

    .team-name {
      font-weight: 900;
    }

    .team-owner {
      display: block;
      margin-top: 2px;
      color: inherit;
      font-size: 0.78rem;
      opacity: 0.82;
    }

    .score {
      min-width: 28px;
      color: var(--gold-2);
      font-size: 1.2rem;
      font-weight: 950;
      text-align: right;
    }

    .champion {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      padding: 22px;
      border-top: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(215, 180, 106, 0.16), rgba(255, 255, 255, 0.04));
    }

    .champion h2 {
      font-size: 1.55rem;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 22px, 1180px);
        padding-top: 16px;
      }

      .hero {
        padding-top: 16px;
      }

      .tabs {
        gap: 6px;
        padding: 7px;
        border-radius: 18px;
      }

      .tab {
        min-height: 42px;
        padding: 0 8px;
        font-size: 0.88rem;
      }

      .toolbar,
      .match-grid,
      .champion {
        grid-template-columns: 1fr;
      }

      .stat {
        text-align: left;
      }

      .country-head {
        grid-template-columns: 1fr;
      }

      .match-top {
        display: grid;
      }

      .countries-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .country-tile {
        min-height: 128px;
      }

      .bracket {
        display: flex;
        flex-direction: column;
        overflow-x: visible;
      }

      .round {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="eyebrow">Mundial 2026</div>
      <h1>Portal Sorteo Mundial 2026</h1>
      <p>Consulta participantes, países asignados, calendario de grupos y avance del bracket en un solo lugar.</p>
    </header>

    <nav class="tabs" aria-label="Navegación principal">
      <button class="tab active" type="button" data-view="participants">Participantes</button>
      <button class="tab" type="button" data-view="countries">Países</button>
      <button class="tab" type="button" data-view="bracket">Bracket</button>
    </nav>

    <section id="participants" class="view active" aria-labelledby="participants-title">
      <div class="panel toolbar">
        <div class="field">
          <label id="participants-title" for="participantSelect">Buscar participante</label>
          <select id="participantSelect"></select>
        </div>
        <div class="stat">
          <strong id="participantCount">0</strong>
          <span>países asignados</span>
        </div>
      </div>
      <div id="participantAssignments" class="assignments"></div>
    </section>

    <section id="countries" class="view" aria-labelledby="countries-title">
      <div class="panel">
        <div class="section-title">
          <h2 id="countries-title">Países</h2>
          <span>48 selecciones</span>
        </div>
        <div id="countriesGrid" class="countries-grid" style="padding: 20px;"></div>
      </div>
      <div id="countryDetail" class="country-detail"></div>
    </section>

    <section id="bracket" class="view" aria-labelledby="bracket-title">
      <div class="panel bracket-wrap">
        <div class="section-title">
          <h2 id="bracket-title">Bracket</h2>
          <span>Camino al campeón</span>
        </div>
        <div id="bracketGrid" class="bracket"></div>
        <div id="championPanel" class="champion"></div>
      </div>
    </section>
  </main>

  <script>
    const data = WORLD_CUP_DATA;
    const countryByCode = new Map(data.countries.map((country) => [country.code, country]));
    const assignments = data.countries.map((country, index) => ({
      country,
      owner: data.participants[index]
    }));
    const ownerByCode = new Map(assignments.map((item) => [item.country.code, item.owner]));
    const uniqueParticipants = [...new Set(data.participants)].sort((a, b) => a.localeCompare(b, "es"));

    const tabs = document.querySelectorAll(".tab");
    const views = document.querySelectorAll(".view");
    const participantSelect = document.querySelector("#participantSelect");
    const participantCount = document.querySelector("#participantCount");
    const participantAssignments = document.querySelector("#participantAssignments");
    const countriesGrid = document.querySelector("#countriesGrid");
    const countryDetail = document.querySelector("#countryDetail");
    const bracketGrid = document.querySelector("#bracketGrid");
    const championPanel = document.querySelector("#championPanel");

    function country(code) {
      return countryByCode.get(code);
    }

    function owner(code) {
      return ownerByCode.get(code) || "Sin asignar";
    }

    function matchesFor(code) {
      return data.matches.filter((match) => match.a === code || match.b === code);
    }

    function opponentCode(match, code) {
      return match.a === code ? match.b : match.a;
    }

    function renderMatches(code) {
      return matchesFor(code).map((match) => {
        const rivalCode = opponentCode(match, code);
        const rival = country(rivalCode);
        return `
          <article class="match-card">
            <div class="match-top">
              <span>${match.date} · ${match.time}</span>
              <span>Partido ${match.number}</span>
            </div>
            <div class="opponent">${rival.flag} vs ${rival.displayName}</div>
            <div class="rival-owner">Rival: ${owner(rivalCode)}</div>
            <div class="match-grid">
              <span>Grupo ${match.group}</span>
              <span>${match.venue}</span>
              <span>${country(match.a).displayName} vs ${country(match.b).displayName}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderCountryBlock(countryData, ownerName) {
      return `
        <article class="panel country-card-full">
          <div class="country-head">
            <div class="flag">${countryData.flag}</div>
            <div>
              <h2>${countryData.displayName}</h2>
              <div class="meta">
                <span class="pill">Grupo ${countryData.group}</span>
                <span class="pill">Dueño: ${ownerName}</span>
              </div>
            </div>
          </div>
          <div class="matches">${renderMatches(countryData.code)}</div>
        </article>
      `;
    }

    function renderParticipants() {
      participantSelect.innerHTML = uniqueParticipants.map((name) => (
        `<option value="${name}">${name}</option>`
      )).join("");
      participantSelect.value = uniqueParticipants[0];
      renderParticipantSelection();
    }

    function renderParticipantSelection() {
      const selected = participantSelect.value;
      const owned = assignments.filter((item) => item.owner === selected);
      participantCount.textContent = owned.length;
      participantAssignments.innerHTML = owned.map((item) => (
        renderCountryBlock(item.country, item.owner)
      )).join("");
    }

    function renderCountries() {
      countriesGrid.innerHTML = data.countries.map((item, index) => `
        <button class="country-tile ${index === 0 ? "active" : ""}" type="button" data-country="${item.code}">
          <span class="flag">${item.flag}</span>
          <strong>${item.displayName}</strong>
        </button>
      `).join("");
      renderCountryDetail(data.countries[0].code);
    }

    function renderCountryDetail(code) {
      const item = country(code);
      countryDetail.innerHTML = renderCountryBlock(item, owner(code)).replace("country-card-full", "country-detail-card");
      document.querySelectorAll(".country-tile").forEach((button) => {
        button.classList.toggle("active", button.dataset.country === code);
      });
    }

    function renderBracketTeam(code, score, winnerCode) {
      const item = country(code);
      return `
        <div class="team-row ${code === winnerCode ? "winner" : ""}">
          <div>
            <span class="team-name">${item.flag} ${item.displayName}</span>
            <span class="team-owner">${owner(code)}</span>
          </div>
          <span class="score">${score}</span>
        </div>
      `;
    }

    function renderBracket() {
      bracketGrid.innerHTML = data.bracket.rounds.map((round) => `
        <section class="round">
          <h2>${round.name}</h2>
          ${round.matches.map((match) => `
            <article class="bracket-match">
              ${renderBracketTeam(match.a, match.scoreA, match.winner)}
              ${renderBracketTeam(match.b, match.scoreB, match.winner)}
            </article>
          `).join("")}
        </section>
      `).join("");

      const champion = country(data.bracket.champion);
      championPanel.innerHTML = `
        <div class="flag">${champion.flag}</div>
        <div>
          <div class="eyebrow">Campeón</div>
          <h2>${champion.displayName}</h2>
          <div class="meta">
            <span class="pill">Ganador del sorteo: ${owner(champion.code)}</span>
          </div>
        </div>
      `;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.toggle("active", item === tab));
        views.forEach((view) => view.classList.toggle("active", view.id === tab.dataset.view));
      });
    });

    participantSelect.addEventListener("change", renderParticipantSelection);
    countriesGrid.addEventListener("click", (event) => {
      const button = event.target.closest(".country-tile");
      if (button) renderCountryDetail(button.dataset.country);
    });

    renderParticipants();
    renderCountries();
    renderBracket();
  </script>
</body>
</html>
